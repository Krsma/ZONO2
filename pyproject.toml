[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "predictive-zonotope-reduction"
version = "0.1.0"
description = "Predictive zonotope reduction experiments for bounded-memory runtime monitoring."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24",
    "pandas>=2.0",
    "scipy>=1.10",
    "matplotlib>=3.7",
]

[project.scripts]
pzr-benchmark = "pzr.experiments.cli:main"
pzr-paper-figures = "pzr.experiments.paper_figures:main"
pzr-run-experiments = "pzr.experiments.suite:main"
pzr-distill-policy = "pzr.learning.distill_cli:main"

[project.optional-dependencies]
learning = [
    "torch>=2.0",
]
dev = [
    "pytest>=8",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
